<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vitaminka Assistant — Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .page-content {
      text-align: center;
      color: white;
      padding: 40px 20px;
    }
    .page-content h1 { font-size: 2.5rem; margin-bottom: 10px; }
    .page-content p { font-size: 1.1rem; opacity: 0.7; margin-bottom: 30px; }
    .hint {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 16px 24px;
      display: inline-block;
      font-size: 0.9rem;
      opacity: 0.8;
    }
    .hint span { color: #64b5f6; }
  </style>
</head>
<body>
  <div class="page-content">
    <h1>Vitaminka Shop</h1>
    <p>Демонстрация AI-ассистента для интернет-магазина</p>
    <div class="hint">
      Нажмите на кнопку <span>в правом нижнем углу</span>
    </div>
  </div>

  <!-- Vitaminka Widget — загружается с локального backend -->
  <script>
    window.VITAMINKA_API_URL = 'http://localhost:8000';
    window.VITAMINKA_SHOP_ID = 'test_vitaminof';
  </script>
  <script src="http://localhost:8000/static/widget.js"></script>
</body>
</html>
