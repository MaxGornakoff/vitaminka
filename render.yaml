services:
  - type: web
    name: vitaminka-backend
    runtime: python
    plan: starter
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    disk:
      name: chroma-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"
      - key: LLM_PROVIDER
        value: cohere
      - key: CHROMA_PERSIST_DIR
        value: /var/data/chroma
      - key: CHROMA_COLLECTION_NAME
        value: products
      - key: RAG_TOP_K
        value: "5"
      - key: CATALOG_SYNC_INTERVAL_HOURS
        value: "6"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: vitaminka-db
          property: connectionString

databases:
  - name: vitaminka-db
    plan: starter
    databaseName: vitaminka_db
    user: vitaminka
